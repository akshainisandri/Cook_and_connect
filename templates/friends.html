<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Friends | Cook & Connect</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body{
  background: linear-gradient(135deg, rgba(43,16,85,0.9), rgba(28,5,34,0.9));
  color:white;
  padding:40px;
  min-height:100vh;
}

.glass-card{
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

.search-input{
  border-radius:15px;
}

.friend-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.friend-item:last-child{
  border-bottom:none;
}

.btn-purple{
  background:#7e5bef;
  color:white;
  border:none;
  border-radius:12px;
  padding:5px 12px;
}

.feed-card{
  background: rgba(255,255,255,0.08);
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
}
</style>
</head>
<body>
{% include 'navbar.html' %}
<h3 class="mb-4"><i class="bi bi-people-fill"></i> Friends</h3>

<!-- 🔍 Search Users -->
<div class="glass-card">
  <h5>Search Users</h5>
  <input type="text" id="searchInput" class="form-control search-input mb-3" placeholder="Search by name...">
  <div id="searchResults"></div>
</div>

<!-- 📩 Friend Requests -->
<div class="glass-card">
  <h5>Friend Requests</h5>
  <div id="friendRequests"></div>
</div>

<!-- 👥 My Friends -->
<div class="glass-card">
  <h5>My Friends</h5>
  <div id="friendsList"></div>
</div>

<!-- 📰 Friends Feed -->
<div class="glass-card">
  <h5>Friends Feed</h5>
  <div id="friendsFeed"></div>
</div>

<script>

// 🔍 Search Users
document.getElementById("searchInput").addEventListener("input", function(){
  const query = this.value.trim();
  const container = document.getElementById("searchResults");

  if(!query){
    container.innerHTML="";
    return;
  }

  fetch(`/search-users?q=${query}`)
  .then(res => res.json())
  .then(data => {
    container.innerHTML = "";

    if(!data.length){
      container.innerHTML="<p>No users found</p>";
      return;
    }

    data.forEach(user => {
      container.innerHTML += `
        <div class="friend-item">
          <span>${user.name} (${user.email})</span>
          <button class="btn-purple" onclick="sendRequest(${user.id})">
            Add Friend
          </button>
        </div>
      `;
    });
  });
});

// 📩 Send Request
function sendRequest(id){
  fetch("/send-request",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({receiver_id:id})
  })
  .then(res=>res.json())
  .then(data=>{
    alert(data.message);
  });
}

// 📩 Load Friend Requests
function loadRequests(){
  fetch("/friend-requests")
  .then(res=>res.json())
  .then(data=>{
    const container = document.getElementById("friendRequests");
    container.innerHTML="";

    if(!data.length){
      container.innerHTML="<p>No pending requests</p>";
      return;
    }

    data.forEach(req=>{
      container.innerHTML+=`
        <div class="friend-item">
          <span>${req.name}</span>
          <button class="btn-purple" onclick="acceptRequest(${req.request_id})">
            Accept
          </button>
        </div>
      `;
    });
  });
}

// ✅ Accept Request
function acceptRequest(id){
  fetch("/accept-request",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({request_id:id})
  })
  .then(res=>res.json())
  .then(data=>{
    alert(data.message);
    loadRequests();
    loadFriends();
    loadFeed();
  });
}

// 👥 Load Friends
function loadFriends(){
  fetch("/my-friends")
  .then(res=>res.json())
  .then(data=>{
    const container = document.getElementById("friendsList");
    container.innerHTML="";

    if(!data.length){
      container.innerHTML="<p>No friends yet</p>";
      return;
    }

    data.forEach(friend=>{
  container.innerHTML+=`
    <div class="friend-item">
      <a href="/profile/${friend.id}" 

         style="color:white;text-decoration:none;">
        ${friend.name}
      </a>
    </div>
  `;
});

    
  });
}

// 📰 Load Friends Feed
function loadFeed(){
  fetch("/friends-feed")
  .then(res=>res.json())
  .then(data=>{
    const container = document.getElementById("friendsFeed");
    container.innerHTML="";

    if(!data.length){
      container.innerHTML="<p>No posts from friends yet</p>";
      return;
    }

    data.forEach(post=>{
      container.innerHTML+=`
        <div class="feed-card">
          <strong>${post.user}</strong>
          <p class="mb-1">${post.name}</p>
          ${post.image ? `<img src="${post.image}" class="img-fluid rounded mb-2" style="max-height:200px;">` : ""}
          <p>${post.note || ""}</p>
          <small>${post.cooked_at}</small>
        </div>
      `;
    });
  });
}

// 🔄 Auto Refresh Every 5 Seconds (For Demo)
setInterval(()=>{
  loadRequests();
  loadFriends();
  loadFeed();
}, 5000);

// Initial Load
loadRequests();
loadFriends();
loadFeed();
setInterval(() => {
  loadRequests();
}, 3000);


</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
